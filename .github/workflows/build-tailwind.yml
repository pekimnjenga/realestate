name: Build Tailwind CSS

on:
  push:
    paths:
      - 'app/static/css/**'
      - 'app/templates/**'
      - 'app/**'
      - '.github/workflows/build-tailwind.yml'
  pull_request:
    paths:
      - 'app/static/css/**'
      - 'app/templates/**'
      - 'app/**'

jobs:
  build-tailwind:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Ensure tailwind binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          # Use an existing repo binary if present and executable
          if [ -x ./tailwindcss ]; then
            echo "Using bundled tailwindcss"
            ./tailwindcss --version
          else
            echo "No bundled binary found — downloading latest Tailwind CLI"
            case "$RUNNER_OS" in
              Linux)
                URL="https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64"
                ;;
              macOS)
                URL="https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-macos-arm64"
                ;;
              *)
                URL="https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64"
                ;;
            esac
            curl -L -o tailwindcss "$URL"
            chmod +x tailwindcss || true
          fi

      - name: Ensure tailwind binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path -Path ./tailwindcss.exe -PathType Leaf) {
            Write-Host "Using bundled tailwindcss.exe"
            ./tailwindcss.exe --version
          } else {
            Write-Host "Downloading Tailwind CLI for Windows"
            $url = "https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-windows-x64.exe"
            Invoke-WebRequest -Uri $url -OutFile tailwindcss.exe
          }

      - name: Build CSS (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p app/static/css
          ./tailwindcss -i ./app/static/css/input.css -o ./app/static/css/output.css --content "./app/templates/**/*.html" "./app/**/*.py" "./app/static/js/**/*.js" --minify

      - name: Build CSS (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir -Force -Path app/static/css
          .\tailwindcss.exe -i .\app\static\css\input.css -o .\app\static\css\output.css --content "./app/templates/**/*.html" "./app/**/*.py" "./app/static/js/**/*.js" --minify
