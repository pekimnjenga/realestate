<div style="font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f9f9f9; padding: 40px 20px;">
    <div style="max-width: 600px; margin: 0 auto; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
        <div style="background: #000; padding: 30px; text-align: center;">
            <h1 style="color: #7cbd1e; margin: 0; letter-spacing: 6px; font-size: 18px; font-weight: 900; text-transform: uppercase;">
                I Like It Properties
            </h1>
        </div>

        {% if blog.image_url %}
        <img src="{{ blog.image_url }}" alt="{{ blog.title }}" style="width: 100%; height: auto; display: block;">
        {% endif %}

        <div style="padding: 40px; border: 1px solid #eee; border-top: none;">
            <p style="color: #999; font-weight: 300; text-transform: uppercase; font-size: 10px; letter-spacing: 3px; margin-bottom: 15px;">
                {{ blog.date_posted.strftime('%B %d, %Y') }} — By {{ blog.author }}
            </p>

            <h2 style="color: #1a1d21; font-size: 32px; font-weight: 900; margin: 0 0 20px 0; line-height: 1.1; letter-spacing: -1px; text-transform: uppercase;">
                {{ blog.title }}
            </h2>

            <div style="width: 40px; height: 3px; background: #7cbd1e; margin-bottom: 25px;"></div>

            <p style="color: #555; line-height: 1.8; font-size: 15px; font-weight: 300; margin-bottom: 30px;">
                {{ blog.summary }}
            </p>

            <a href="{{ blog_url if blog_url is defined else url_for('main.blog_detail', id=blog.id, _external=True) }}" 
               style="display: inline-block; background: #000; color: #fff; padding: 18px 35px; text-decoration: none; font-weight: 900; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; transition: all 0.3s ease;">
                Read Journal Entry
            </a>
        </div>

        <div style="padding: 30px; text-align: center; background: #fff;">
            <p style="color: #bbb; font-size: 10px; letter-spacing: 1px; text-transform: uppercase;">&copy; 2026 Sanctuary Living. All rights reserved.</p>
            <a href="{{ unsubscribe_url if unsubscribe_url is defined else url_for('main.unsubscribe', email=sub_email, _external=True) }}" style="color: #7cbd1e; font-size: 10px; text-decoration: none; font-weight: bold;">Unsubscribe</a>
        </div>
    </div>
</div>
