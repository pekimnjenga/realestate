{% extends "base.html" %}
{% block title %}<title>Admin | Edit Blog Post - I Like It Properties</title>{% endblock %}
{% block meta_description %}
  <meta name="robots" content="noindex, nofollow">
{% endblock %}
{% block content %}
<section class="py-5">
  <div class="container">
    <h2>Edit Blog Post</h2>
    <form method="POST" enctype="multipart/form-data">
      <div class="mb-3">
        <label for="title" class="form-label">Title</label>
        <input type="text" name="title" class="form-control" value="{{ post.title }}" required>
      </div>
      <div class="mb-3">
        <label for="summary-editor" class="form-label" style="font-weight: bold;">Summary</label>
        <div id="summary-editor" style="height: 150px; border: 1px solid #ced4da; border-radius: 0.25rem; background-color: #fff;" class="mb-3"></div>
        <input type="hidden" name="summary" id="summary-content">
      </div>
      <div class="mb-3">
        <label for="content-editor" class="form-label" style="font-weight: bold;">Content</label>
        <div id="content-editor" style="height: 300px; border: 1px solid #ced4da; border-radius: 0.25rem; background-color: #fff;" class="mb-3"></div>
        <input type="hidden" name="content" id="content-hidden">
      </div>
      <div class="mb-3">
        <label for="image" class="form-label">Replace Image (optional)</label>
        <input type="file" name="image" class="form-control">
        <small class="text-muted">Current image: {{ post.image }}</small>
      </div>
      <button type="submit" class="btn btn-primary">Update Blog</button>
    </form>
  </div>
</section>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    initializeQuill('#summary-editor', '#summary-content');
    initializeQuill('#content-editor', '#content-hidden');

    // Prepopulate Quill editors with existing data
    document.querySelector('#summary-editor .ql-editor').innerHTML = `{{ post.summary|safe }}`;
    document.querySelector('#content-editor .ql-editor').innerHTML = `{{ post.content|safe }}`;
  });
</script>
{% endblock %}
