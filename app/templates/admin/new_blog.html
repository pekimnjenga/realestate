{% extends "base.html" %}

{% block title %}<title>Admin | New Blog Post - I Like It Properties</title>{% endblock %}

{% block meta_description %}
  <meta name="robots" content="noindex, nofollow">
{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-12 max-w-4xl">
    <div class="mb-6">
    <a href="{{ url_for('main.admin_dashboard') }}" 
       class="inline-flex items-center text-xs font-bold text-gray-400 hover:text-[#7cbd1e] uppercase tracking-widest transition-colors group">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2 transform group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Back to Admin Dashboard
    </a>
    </div>
    <div class="bg-white rounded-lg shadow-lg p-8 border border-gray-100">
        <h2 class="text-3xl font-bold text-gray-800 mb-8 border-b pb-4">Create New Blog Post</h2>
        
        <form method="POST" enctype="multipart/form-data" id="blog-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-2 uppercase tracking-wider">Blog Title</label>
                <input type="text" name="title" 
                       class="w-full px-4 py-3 border border-gray-300 rounded-sm focus:ring-2 focus:ring-[#7cbd1e] focus:border-transparent outline-none transition-all" 
                       placeholder="Enter a catchy title..." required>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2 uppercase tracking-wider">Category</label>
                    <input type="text" name="category" 
                           class="w-full px-4 py-3 border border-gray-300 rounded-sm focus:ring-2 focus:ring-[#7cbd1e] focus:border-transparent outline-none transition-all" 
                           placeholder="e.g. Market Trends, Buying Tips" required>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2 uppercase tracking-wider">Featured Image</label>
                    <input type="file" name="image" accept="image/*"
                           class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-sm file:border-0 file:text-sm file:font-semibold file:bg-gray-100 file:text-gray-700 hover:file:bg-gray-200 cursor-pointer">
                </div>
            </div>

            <div class="mb-8">
                <label class="block text-sm font-semibold text-gray-700 mb-2 uppercase tracking-wider">Blog Content</label>
                <div id="editor" class="bg-white" style="height: 400px; border-radius: 0.25rem;"></div>
                <input type="hidden" name="content" id="content-input">
            </div>

            <div class="flex items-center justify-end space-x-4 border-t pt-6">
                <a href="{{ url_for('main.admin_blogs') }}" class="text-gray-500 hover:text-gray-700 font-medium px-4 py-2">Cancel</a>
                <button type="submit" 
                        class="bg-[#7cbd1e] hover:bg-[#6aa31a] text-white px-10 py-3 rounded-sm font-bold uppercase tracking-wider transition-colors shadow-md">
                    Publish Post
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    // Use the shared initializer from base.html to create the editor and sync content
    document.addEventListener('turbo:load', function () {
        if (typeof initializeQuill === 'function') {
            initializeQuill('#editor', '#content-input');
        }
    });
    // Fallback for non-Turbo navigations
    document.addEventListener('DOMContentLoaded', function () {
        if (typeof initializeQuill === 'function') {
            initializeQuill('#editor', '#content-input');
        }
    });
</script>

<style>
    /* Customizing Quill to match your site style */
    .ql-toolbar.ql-snow {
        border-color: #d1d5db;
        border-radius: 0.25rem 0.25rem 0 0;
        background-color: #f9fafb;
    }
    .ql-container.ql-snow {
        border-color: #d1d5db;
        border-radius: 0 0 0.25rem 0.25rem;
        font-family: inherit;
        font-size: 1rem;
    }
</style>
{% endblock %}
